<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap');

        :root {
            --accent: #F59E0B;
            --surface: #0F172A;
            --bg: #020617;
        }

        body {
            background-color: var(--bg);
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .serif-font { font-family: 'Playfair Display', serif; }

        .tactical-border {
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 180px;
        }

        .readable-section {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.02);
            position: relative;
        }

        .readable-section:hover {
            background: rgba(245, 158, 11, 0.03);
            border-color: rgba(245, 158, 11, 0.2);
            transform: translateY(-2px);
        }

        .reading-now {
            background: rgba(245, 158, 11, 0.08) !important;
            border-left: 4px solid var(--accent) !important;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            transform: scale(1.01);
        }

        .law-item {
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .law-item.active {
            border-left: 3px solid var(--accent);
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
        }

        @keyframes voice-pulse {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .pulse-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin: 0 1px;
            display: inline-block;
        }
        .animating .pulse-bar {
            animation: voice-pulse 0.8s infinite ease-in-out;
        }

        .blueprint-canvas {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .scrollbar-custom::-webkit-scrollbar { width: 4px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .pulse-core {
            position: relative;
        }
        .pulse-core::after {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: var(--accent);
            border-radius: 50%;
            animation: ping 2s infinite;
            opacity: 0.5;
        }

        .law-image-header {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 2.5rem;
            opacity: 0.6;
            filter: grayscale(40%) contrast(110%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="w-full bg-[#0F172A]/80 backdrop-blur-xl border-b border-white/5 py-4 sticky top-0 z-50">

            <div class="flex flex-wrap items-center gap-4 bg-slate-950/50 p-2 px-6 rounded-2xl border border-white/5 shadow-inner">

    </header>

    <main class="flex-grow w-full max-w-[1600px] mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">
        <aside class="w-full lg:w-96 shrink-0 flex flex-col gap-6">
            <!-- Strategic Consult ✨ -->
            <div class="bg-slate-900 border border-amber-500/20 rounded-[2rem] p-6 shadow-xl">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-amber-500 mb-4 flex items-center">

                <textarea id="situationInput" placeholder="Describe a real-world situation for logic analysis..."

                <button onclick="getConsultation()" id="consultBtn" 
                    class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 text-[10px] font-black uppercase tracking-widest py-3 rounded-xl transition-all">

            </div>

            <div class="bg-slate-900/50 rounded-3xl p-6 border border-white/5">
                <div class="chart-container">
                    <canvas id="powerChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[2rem] border border-white/5 overflow-hidden flex flex-col h-[500px] shadow-2xl">
                <div class="p-6 bg-slate-800/30 flex items-center justify-between border-b border-white/5">
                    <h3 class="text-xs font-black uppercase tracking-widest">Archive Core</h3>
                    <input type="text" id="lawsFilter" placeholder="Locate Law..." class="bg-slate-950/50 border border-white/10 rounded-xl px-4 py-1.5 text-xs text-slate-300 focus:ring-1 focus:ring-amber-500 outline-none w-32">
                </div>
                <div id="laws-list" class="overflow-y-auto scrollbar-custom flex-grow"></div>
            </div>

        <section class="flex-grow">
            <div id="law-detail-pane" class="bg-slate-900 rounded-[3rem] min-h-[900px] p-8 lg:p-16 border border-white/5 relative shadow-inner overflow-hidden">
                <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-amber-500/5 blur-[140px] rounded-full -mr-64 -mt-64"></div>
                
                <div id="empty-state" class="flex flex-col items-center justify-center text-center space-y-10 pt-64 opacity-50">
                    <h2 class="text-4xl serif-font font-black mb-4 uppercase tracking-tighter">Awaiting Neural Link</h2>
                </div>

                <div id="detail-content" class="hidden relative z-10">
                    <img id="detail-image" src="" alt="Strategic Visual" class="law-image-header mb-12 shadow-2xl">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-20">
                        <div>
                            <span id="detail-category" class="px-5 py-1.5 bg-amber-500/10 text-amber-500 text-[10px] uppercase font-black tracking-[0.5em] rounded-lg mb-6 inline-block border border-amber-500/20"></span>
                            <h2 id="detail-title" class="text-5xl lg:text-7xl serif-font font-black text-white leading-none tracking-tighter"></h2>
                        </div>
                        <button onclick="expandIntelligence()" id="expandBtn" 
                            class="flex items-center space-x-2 bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">
                            <span>✨ Expand Intelligence</span>
                        </button>
                    </div>

                    <div id="neuralInsightBox" class="mb-20 p-8 rounded-[2.5rem] bg-indigo-900/10 border border-indigo-500/20 hidden">
                        <h4 class="text-[10px] uppercase tracking-[0.4em] text-indigo-400 font-black mb-4">✨ Modern Expansion Readout</h4>
                        <div id="insightContent" class="text-lg text-slate-200 serif-font italic"></div>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-16 mb-20">
                        <div class="xl:col-span-5">
                            <h4 class="text-[10px] uppercase tracking-[0.4em] text-amber-500 font-black mb-6">Visual Logic</h4>
                            <div id="visual-analogy" class="blueprint-canvas h-80 rounded-[2.5rem] flex items-center justify-center border border-white/5"></div>
                        </div>
                        <div class="xl:col-span-7">
                            <h4 class="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-black mb-6">Psychological Axis</h4>
                            <div id="detail-psych" class="readable-section text-3xl leading-snug text-slate-100 serif-font italic"></div>
                        </div>
                    </div>

                    <div class="space-y-24">
                        <div>
                            <h3 class="text-[10px] font-black text-amber-500 flex items-center mb-10 uppercase tracking-[0.5em]">
                                <span class="mr-5 bg-amber-500 text-slate-950 w-10 h-10 flex items-center justify-center rounded-xl text-sm font-black italic">PX</span> Historical Precedent
                            </h3>
                            <div id="detail-example" class="readable-section text-2xl leading-relaxed text-slate-300 font-light tracking-tight"></div>
                        </div>

                        <div class="bg-gradient-to-br from-slate-800/80 to-slate-950 p-12 lg:p-16 rounded-[4rem] tactical-border">
                            <h3 class="text-[10px] font-black uppercase tracking-[0.6em] text-amber-500 mb-10">Deployment Strategy</h3>
                            <div id="detail-strategy" class="readable-section text-2xl leading-relaxed text-white font-bold tracking-tight"></div>
                        </div>

                        <div class="bg-rose-950/20 p-12 rounded-[4rem] border border-rose-500/10">
                            <h3 class="text-[10px] font-black text-rose-500 mb-8 uppercase tracking-[0.4em]">Critical Reversal & Defensive Measure</h3>
                            <div id="detail-reversal" class="readable-section text-xl text-slate-400 italic leading-relaxed serif-font"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";

        async function callGemini(prompt, systemInstruction = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("Link failure.");
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "Protocol interpretation error.";
                } catch (err) {
                    if (i === 4) return "Fatal Neural Link Timeout. Check API state.";
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function getConsultation() {
            const input = document.getElementById('situationInput').value;
            if (!input) return;
            const btn = document.getElementById('consultBtn');
            const output = document.getElementById('consultOutput');
            btn.innerText = "Querying Oracle...";
            output.classList.remove('hidden');
            output.innerText = "Scanning 48 laws for heuristic matches...";
            const response = await callGemini(input, "You are a master strategist based on Robert Greene. Analyze the scenario. Suggest 1 law and provide a cold, tactical 2-sentence solution.");
            output.innerText = response;
            btn.innerText = "Consult Oracle ✨";
        }

        async function expandIntelligence() {
            const law = lawsData.find(l => l.id === state.selectedId);
            const box = document.getElementById('neuralInsightBox');
            const content = document.getElementById('insightContent');
            const btn = document.getElementById('expandBtn');
            btn.innerHTML = "✨ Processing...";
            box.classList.remove('hidden');
            content.innerText = "Extrapolating modern power dynamics...";
            const response = await callGemini(`Law #${law.id}: ${law.title}. Provide a high-stakes modern corporate or geopolitical expansion analysis and one ruthless tip.`);
            content.innerText = response;
            btn.innerHTML = "✨ Intelligence Expanded";
        }

        const lawsData = [
            { id: 1, title: "Never Outshine the Master", category: "Reputation", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Masters are like the sun; their ego provides warmth. Reminding them of their darkness triggers termination.", example: "Nicolas Fouquet vs Louis XIV: Fouquet built a chateau more beautiful than the King's; he was arrested the next day.", strategy: "Frame your innovations as suggestions the master once 'casually mentioned'.", reversal: "If the master is weak, outshine them to accelerate their fall.", visual: `<div class="w-16 h-16 bg-amber-500 rounded-full shadow-[0_0_50px_gold]"></div>` },
            { id: 2, title: "Never Trust Friends, Use Enemies", category: "Alliances", image: "https://images.unsplash.com/photo-1521791136064-7986c2959210?q=80", psych: "Enemies have more to prove and are more loyal when converted.", example: "Michael III of Byzantium was murdered by the stable boy he raised to be his 'best friend'.", strategy: "Hire professionals, not friends. Distance ensures objective judgment.", reversal: "A friend can be a useful scapegoat in a crisis.", visual: `<div class="w-20 h-1 bg-slate-700"></div>` },
            { id: 3, title: "Conceal Your Intentions", category: "Deception", image: "https://images.unsplash.com/photo-1590422443890-2e46f632367c?q=80", psych: "Keep them guessing to drain their mental energy.", example: "Bismarck used a fake peace speech to trick the King into funding the military for a war.", strategy: "Talk endlessly about goals that don't matter. Create a smoke screen of honesty.", reversal: "A smokescreen works only if you don't already have a reputation for deceit.", visual: `<div class="w-16 h-16 border-4 border-dashed border-white/20 animate-spin"></div>` },
            { id: 4, title: "Always Say Less Than Necessary", category: "Communication", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "Words are like currency; the more you print, the less they are worth.", example: "Louis XIV would listen then say 'I shall see' and walk away, leaving courtiers in terror.", strategy: "Short answers create mystery. The less you speak, the less likely you say something foolish.", reversal: "Silence can look suspicious; use chatter to hide important data.", visual: `<div class="w-24 h-1 bg-amber-500"></div>` },
            { id: 5, title: "So Much Depends on Reputation", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "It intimidates enemies before a word is uttered.", example: "Chuge Liang sat alone on a wall playing a lute to scare off 150,000 troops who feared his traps.", strategy: "Anchor identity on one quality (reliability). Watch as it precedes you.", reversal: "If reputation is ruined beyond fix, start a new identity.", visual: `<div class="w-20 h-20 border-8 border-amber-500 rotate-45"></div>` },
            { id: 6, title: "Court Attention at All Cost", category: "Reputation", image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80", psych: "In power, being ignored is death.", example: "P.T. Barnum used a beggar to lay bricks in a loop to pack his museum with curious crowds.", strategy: "Create an unforgettable image. Better slandered than ignored.", reversal: "Once at the top, be more selective with the light.", visual: `<div class="w-8 h-8 bg-amber-500 animate-ping"></div>` },
            { id: 7, title: "Get Others to Do the Work", category: "Power", image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80", psych: "Borrow brilliance to accelerate rise. Master appears to have done the labor.", example: "Edison took credit for Tesla's research to build General Electric.", strategy: "Hire specialists for labor while you claim the outcome.", reversal: "Ensure you have the power to protect credit once work is done.", visual: `<div class="w-12 h-12 border-2 border-white rounded animate-bounce"></div>` },
            { id: 8, title: "Make Others Come to You", category: "Tactics", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Control the tempo. Bait them with gains then strike.", example: "Talleyrand baited Napoleon into escaping Elba to ensure his final ruin.", strategy: "Lure rivals to your home ground where they are fatigued.", reversal: "If time is against you, strike suddenly first.", visual: `<div class="w-20 h-20 border-2 border-amber-500 animate-pulse"></div>` },
            { id: 9, title: "Win Through Action, Not Argument", category: "Influence", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Argument stirs resentment. Action is undeniable proof.", example: "Michelangelo faked chiseling David's nose to please a mayor.", strategy: "Demonstrate, don't explicate. Let utility silence critics.", reversal: "Argument is useful as a deceptive smoke screen.", visual: `<div class="w-12 h-12 bg-white rotate-45"></div>` },
            { id: 10, title: "Infection: Avoid the Unhappy", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "The unlucky draw misfortune on themselves and you.", example: "Lola Montez ruined every powerful man she touched with her instability.", strategy: "Audit circle for victims. Distance immediately.", reversal: "None. Misfortune is contagious.", visual: `<div class="w-4 h-4 bg-rose-500 rounded-full"></div>` },
            { id: 11, title: "Keep People Dependent", category: "Power", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "To be needed is to be free.", example: "Bismarck made himself indispensable to Kings who disliked him.", strategy: "Own a critical secret that cannot be replaced.", reversal: "Dependency ties you to the master; be ready to cut the tie.", visual: `<div class="w-1 h-32 bg-amber-500"></div>` },
            { id: 12, title: "Use Selective Honesty", category: "Deception", image: "https://images.unsplash.com/photo-1513885535751-8b9238bd345a?q=80", psych: "One sincere act covers dozens of lies.", example: "Victor Lustig returned $50,000 to Capone to win his trust.", strategy: "Confess a minor fault to appear transparent.", reversal: "If known as a liar, honesty looks like a trap.", visual: `<div class="w-20 h-4 bg-slate-800"></div>` },
            { id: 13, title: "Appeal to Self-Interest", category: "Alliances", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Greed is an engine. Show them how they win.", example: "Corcyra won an alliance by showing how they secured Athenian seas.", strategy: "Focus 100% on their KPIs, not your legacy.", reversal: "Appeal to vanity for those who prefer to feel noble.", visual: `<div class="w-16 h-16 border-2 border-white"></div>` },
            { id: 14, title: "Pose as a Friend, Work as Spy", category: "Deception", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80", psych: "Knowing your rival is critical.", example: "Duveen paid clients' staff to learn their master's tastes.", strategy: "Ask indirect questions. Sincerity is the cleverest ruse.", reversal: "If caught spying, reputation is shattered.", visual: `<div class="w-4 h-4 bg-amber-500 rounded-full"></div>` },
            { id: 15, title: "Crush Your Enemy Totally", category: "Conflict", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Total annihilation in spirit is path to peace.", example: "Genghis Khan never left a rival partially defeated.", strategy: "In legal disputes, leave no loopholes.", reversal: "If enemy will self-destruct, standing back is efficient.", visual: `<div class="w-20 h-20 bg-rose-900/50 rounded-full"></div>` },
            { id: 16, title: "Use Absence to Increase Respect", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Too much circulation lowers price. Withdraw before taken for granted.", example: "Deioces retired as judge until chaos made Medes beg him to rule.", strategy: "Limit availability to increase perceived value.", reversal: "Establish respect before leaving.", visual: `<div class="w-16 h-16 border-2 border-white opacity-20"></div>` },
            { id: 17, title: "Air of Unpredictability", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Scramble patterns to terrify rivals.", example: "Bobby Fischer defeated Spassky by making explainless blunders.", strategy: "Scramble patterns daily to stimulate interest.", reversal: "Crisis teams need a stable core to avoid panic.", visual: `<div class="grid grid-cols-2 gap-2 w-12"></div>` },
            { id: 18, title: "Do Not Build Fortresses", category: "Conflict", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Isolation cuts intelligence. Better mingle.", example: "First Emperor of China died alone, death hidden.", strategy: "Be the center of information flow.", reversal: "Occasional isolation is required for strategy.", visual: `<div class="w-20 h-20 border-2 border-white">X</div>` },
            { id: 19, title: "Know Who You Deal With", category: "Influence", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Deceive the wrong person and they seek revenge.", example: "Genghis Khan annihilated Muhammad of Khwarizm after an insult.", strategy: "Audit decision-maker's pride before tactical aggression.", reversal: "None. Misjudging is the root of all failure.", visual: `<div class="w-12 h-12 bg-rose-500"></div>` },
            { id: 20, title: "Do Not Commit to Anyone", category: "Alliances", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Stay neutral to be pursued by all sides.", example: "Elizabeth I dangled marriage for 40 years to keep all as allies.", strategy: "Position as neutral mediator.", reversal: "Commit at the end-game to secure the win.", visual: `<div class="w-12 h-12 bg-amber-500 rounded-full"></div>` },
            { id: 21, title: "Play Sucker to Catch Sucker", category: "Deception", image: "https://images.unsplash.com/photo-1506126279646-a697353d3166?q=80", psych: "Make victims feel smart to disarm suspicion.", example: "Arnold/Slack conned financiers with fake mine as 'hayseeds'.", strategy: "Downplay tech knowledge.", reversal: "None. Intelligence is the ultimate bait.", visual: `<div class="w-16 h-16 bg-slate-800">?</div>` },

            { id: 24, title: "Perfect Courtier", category: "Reputation", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Thrive on dexterity. Flatter obliquely.", example: "Castiglione's Sprezzatura: hide toil to look natural.", strategy: "Always talk less about yourself.", reversal: "Too perfect makes you a target for envy.", visual: `<div class="h-2 bg-amber-500 w-10"></div>` },

            { id: 26, title: "Keep Hands Clean", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Spotless efficiency. Mistakes go to pawns.", example: "Cleopatra used Caesar as cat's paw.", strategy: "Conceal mistakes via scapegoat.", reversal: "Over-cleanliness draws suspicion.", visual: `<div class="w-12 h-1 animate-bounce"></div>` },
            { id: 27, title: "Cult Following", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "People need to believe. Offer cause.", example: "Bori claimed vision to see souls.", strategy: "Keep words vague.", reversal: "If cause fails, leader is first lynched.", visual: `<div class="w-1 h-20 bg-amber-500"></div>` },
            { id: 28, title: "Boldness", category: "Tactics", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Timidity is dangerous. Everyone admires bold.", example: "Aretino mocked Pope's elephant for fame.", strategy: "Mistakes made through audacity corrected with more.", reversal: "Blind boldness is just stupidity.", visual: `<div class="w-20 h-20 bg-amber-500 shadow-xl"></div>` },
            { id: 29, title: "Plan to the End", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Ending is everything.", example: "Balboa found Pacific but failed to plan for rivals.", strategy: "Don't be overwhelmed by luck.", reversal: "Rigid plans fail in chaos.", visual: `<div class="w-12 h-12 bg-slate-800"></div>` },
            { id: 30, title: "Effortlessness", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Action must seem natural. Hide toil.", example: "Houdini spent years in secret training.", strategy: "Act effortlessly.", reversal: "If too easy, people think you're lazy.", visual: `<div class="w-12 h-1 bg-amber-500"></div>` },
            { id: 31, title: "Control Options", category: "Deception", image: "https://images.unsplash.com/photo-1506126279646-a697353d3166?q=80", psych: "Victims feel in control but are puppets.", example: "Ivan Terrible abdicated for power grant.", strategy: "Color choices.", reversal: "If obviously evil, they attack you.", visual: `<div class="w-10 h-20 border"></div>` },
            { id: 32, title: "Play to Fantasies", category: "Influence", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Life is harsh; people flock to romance.", example: "Bragadino convinced Venice he made gold.", strategy: "Truth is ugly.", reversal: "Fantasies pop. Have exit strategy.", visual: `<div class="text-amber-500">✧</div>` },
            { id: 33, title: "Discover Thumbscrew", category: "Psychology", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Everyone has weakness.", example: "Duveen validated Arabella Huntington's status.", strategy: "Listen for complaints.", reversal: "Overuse makes victim prefer death.", visual: `<div class="w-4 h-12"></div>` },
            { id: 34, title: "Be Royal", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Act like a King to be one.", example: "Columbus demand for royal titles.", strategy: "Demand much.", reversal: "Acting royal without status is clownish.", visual: `<div class="text-amber-500 font-black">♛</div>` },
            { id: 35, title: "Timing", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Never seem in a hurry.", example: "Fouché survived multiple regimes.", strategy: "Wait for fruition.", reversal: "Wait too long and you miss out.", visual: `<div class="w-1 h-12 animate-spin"></div>` },
            { id: 36, title: "Disdain What You Cannot Have", category: "Power", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "Ignoring problem is revenge.", example: "Henry VIII ignored Pope.", strategy: "Contempt is superiority.", reversal: "Disdain only for powerful.", visual: `<div class="w-8 h-8 opacity-10"></div>` },
            { id: 37, title: "Compelling Spectacles", category: "Influence", image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80", psych: "Visual is route to heart.", example: "Poitiers identified with Diana.", strategy: "Stage spectacles.", reversal: "Ensure core message survives dazzle.", visual: `<div class="w-20 h-20 opacity-10"></div>` },
            { id: 38, title: "Think Alone, Act Like Others", category: "Tactics", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Going against times is punished.", example: "Pausanias executed for luxury.", strategy: "Blend in.", reversal: "Blend too much and you're forgotten.", visual: `<div class="w-4 h-4 bg-white"></div>` },
            { id: 39, title: "Stir Up Waters", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Anger is counterproductive.", example: "Haile Selassie goaded rival.", strategy: "Provoke them while calm.", reversal: "Might attract a shark.", visual: `<div class="w-20 h-20 animate-ping"></div>` },
            { id: 40, title: "Despise Free Lunch", category: "Power", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Offered free is dangerous.", example: "Marlborough's cheapness ruined her.", strategy: "Pay full price.", reversal: "Free lunch is a bribe you can use.", visual: `<div class="text-amber-500">$</div>` },
            { id: 41, title: "Avoid Big Shoes", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "What happens first looks better.", example: "Alexander hated Philip's style.", strategy: "Establish own name.", reversal: "Disparage parent too much looks bitter.", visual: `<div class="w-16 h-16 border"></div>` },
            { id: 42, title: "Strike Shepherd", category: "Conflict", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Trouble from single stirrer.", example: "Athens banishment of stirrer.", strategy: "Isolate source.", reversal: "Identify second in command.", visual: `<div class="w-4 h-4 bg-rose-500 animate-ping"></div>` },
            { id: 43, title: "Hearts and Minds", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "Seduce to move your way.", example: "Marie Antoinette no effort to charm.", strategy: "Operate on psychologies.", reversal: "Coercion faster in crisis.", visual: `<div class="text-amber-500 text-2xl">♥</div>` },
            { id: 44, title: "Mirror Effect", category: "Deception", image: "https://images.unsplash.com/photo-1513885535751-8b9238bd345a?q=80", psych: "Mirroring enemies overreacts them.", example: "Alcibiades Gain power mirroring cultures.", strategy: "Hold up mirror.", reversal: "If they mirror you, they spy.", visual: `<div class="flex space-x-1"><div class="w-8 h-16 bg-amber-500"></div></div>` },
            { id: 45, title: "Reform Slowly", category: "Tactics", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80", psych: "Innovation is traumatic.", example: "Cromwell rapid reform caused revolt.", strategy: "Preach change, respect old ways.", reversal: "If old order toxic, total reform.", visual: `<div class="w-10 h-10 border"></div>` },
            { id: 46, title: "Never Appear Too Perfect", category: "Reputation", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Envy creates silent enemies.", example: "Joe Orton success stirred murder.", strategy: "Admit minor fault.", reversal: "Major weaknesses will crush you.", visual: `<div class="w-12 h-12 bg-white"></div>` },
            { id: 47, title: "Do Not Go Past Mark", category: "Tactics", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Victory is peril.", example: "Cyrus greedy for more blood.", strategy: "Set goal, then stop.", reversal: "Stop early, enemy recovers.", visual: `<div class="w-16 h-1 bg-white relative"></div>` },
            { id: 48, title: "Assume Formlessness", category: "Adaptability", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Fluidity offers no target.", example: "Mao's Mercury logic to win.", strategy: "Develop multi-channel brand.", reversal: "Firm stand necessary to intimidate.", visual: `<div class="w-16 h-16 border animate-spin"></div>` }
        ];

        let state = { selectedId: null, isReading: false, isPaused: false, readingTarget: null, utterance: null, voices: [], selectedVoice: null };
        const synth = window.speechSynthesis;

        function initApp() { renderList(lawsData); initChart(); loadVoices(); setupInteractions(); }

        function loadVoices() {
            state.voices = synth.getVoices();
            if (state.voices.length) populateVoiceDropdown();
            else synth.onvoiceschanged = () => { state.voices = synth.getVoices(); populateVoiceDropdown(); };
        }

        function populateVoiceDropdown() {
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '<option value="">Neural Strategist</option>';
            state.voices.forEach((v, i) => { const o = document.createElement('option'); o.value = i; o.textContent = `${v.name} [${v.lang}]`; select.appendChild(o); });
            select.onchange = (e) => { state.selectedVoice = state.voices[e.target.value] || null; };
        }

        function setupInteractions() {
            document.getElementById('lawsFilter').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                renderList(lawsData.filter(l => l.title.toLowerCase().includes(term) || l.category.toLowerCase().includes(term)));
            });
        }

        function renderList(data) {
            const list = document.getElementById('laws-list');
            list.innerHTML = '';
            data.forEach(law => {
                const div = document.createElement('div');
                div.className = `p-4 border-b border-white/5 law-item cursor-pointer hover:bg-white/5 ${state.selectedId === law.id ? 'active' : ''}`;
                div.innerHTML = `<div class="flex justify-between">
                    <p class="text-xs font-bold text-slate-200">${law.title}</p>
                    <span class="text-[9px] font-mono text-slate-600">${law.id}</span>
                </div>`;
                div.onclick = () => selectLaw(law.id);
                list.appendChild(div);
            });
        }

        function selectLaw(id) {
            state.selectedId = id;
            stopSpeech();
            const law = lawsData.find(l => l.id === id);
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('detail-content').classList.remove('hidden');
            document.getElementById('neuralInsightBox').classList.add('hidden');
            document.getElementById('detail-title').innerText = law.title;
            document.getElementById('detail-category').innerText = law.category;
            document.getElementById('detail-psych').innerText = law.psych;
            document.getElementById('detail-example').innerText = law.example;
            document.getElementById('detail-strategy').innerText = law.strategy;
            document.getElementById('detail-reversal').innerText = law.reversal;
            document.getElementById('visual-analogy').innerHTML = law.visual;
            document.getElementById('detail-image').src = law.image;
            renderList(lawsData);
            document.querySelectorAll('.readable-section').forEach(el => { el.onclick = (e) => { e.stopPropagation(); setReadingCursor(el); }; });
        }

        function setReadingCursor(element) {
            if (state.readingTarget) state.readingTarget.classList.remove('reading-now');
            state.readingTarget = element;
            state.readingTarget.classList.add('reading-now');
            stopSpeech();
            playSpeech();
        }

        function playSpeech() {
            if (synth.speaking && state.isPaused) { synth.resume(); state.isPaused = false; return; }
            if (!state.readingTarget) return;
            state.utterance = new SpeechSynthesisUtterance(state.readingTarget.innerText);
            state.utterance.rate = 0.95;
            if (state.selectedVoice) state.utterance.voice = state.selectedVoice;
            state.utterance.onstart = () => { document.getElementById('voiceBars').classList.add('animating'); };
            state.utterance.onend = () => { document.getElementById('voiceBars').classList.remove('animating'); };
            synth.speak(state.utterance);
        }

        function pauseSpeech() { if (synth.speaking && !state.isPaused) { synth.pause(); state.isPaused = true; } }
        function stopSpeech() { synth.cancel(); state.isReading = state.isPaused = false; }

        function initChart() {
            const ctx = document.getElementById('powerChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Reputation', 'Tactics', 'Deception', 'Influence', 'Conflict', 'Adaptability'],
                    datasets: [{
                        label: 'Bias',
                        data: [90, 75, 95, 80, 70, 85],
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderColor: '#F59E0B',
                        borderWidth: 1,
                        pointRadius: 0
                    }]
                },
                options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        window.onload = initApp;
    </script>
