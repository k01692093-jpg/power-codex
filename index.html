    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap');

        :root {
            --accent: #F59E0B;
            --surface: #0F172A;
            --bg: #020617;
        }

        body {
            background-color: var(--bg);
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .serif-font { font-family: 'Playfair Display', serif; }

        .tactical-border { border: 1px solid rgba(245, 158, 11, 0.1); }

        .chart-container { position: relative; width: 100%; height: 180px; }

        .readable-section {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.02);
        }

        .readable-section:hover {
            background: rgba(245, 158, 11, 0.03);
            border-color: rgba(245, 158, 11, 0.2);
            transform: translateY(-2px);
        }

        .reading-now {
            background: rgba(245, 158, 11, 0.08) !important;
            border-left: 4px solid var(--accent) !important;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .law-item { transition: all 0.3s; border-left: 3px solid transparent; }
        .law-item.active {
            border-left: 3px solid var(--accent);
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
        }

        @keyframes voice-pulse {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .pulse-bar { width: 3px; background: var(--accent); border-radius: 2px; margin: 0 1px; display: inline-block; }
        .animating .pulse-bar { animation: voice-pulse 0.8s infinite ease-in-out; }

        .blueprint-canvas {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .scrollbar-custom::-webkit-scrollbar { width: 4px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .law-image-header {
            width: 100%; height: 300px; object-fit: cover; border-radius: 2.5rem; opacity: 0.6;
            filter: grayscale(40%) contrast(110%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .ai-status-tag {
            font-size: 8px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
            letter-spacing: 1px; font-weight: 900;
        }
        .status-cached { background: #334155; color: #94A3B8; }
        .status-live { background: #065F46; color: #34D399; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

                <div id="empty-state" class="flex flex-col items-center justify-center text-center space-y-10 pt-64 opacity-50">

                        <div>
                            <span id="detail-category" class="px-5 py-1.5 bg-amber-500/10 text-amber-500 text-[10px] uppercase font-black tracking-[0.5em] rounded-lg mb-6 inline-block border border-amber-500/20"></span>

                            class="flex items-center space-x-2 bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">

                        </button>

                        </div>
                        <div id="insightContent" class="text-lg text-slate-200 serif-font italic leading-relaxed"></div>

                            <div id="visual-analogy" class="blueprint-canvas h-80 rounded-[2.5rem] flex items-center justify-center border border-white/5"></div>
                        </div>

                            <h4 class="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-black mb-6">Psychological Axis</h4>

                    <div class="space-y-24">
                        <div>

                            </h3>
                            <div id="detail-example" class="readable-section text-2xl leading-relaxed text-slate-300 font-light tracking-tight"></div>
                        </div>

                        </div>

                        <div class="bg-rose-950/20 p-12 rounded-[4rem] border border-rose-500/10">
                            <h3 class="text-[10px] font-black text-rose-500 mb-8 uppercase tracking-[0.4em]">Reversal & Defensive Measures</h3>

        </section>
    </main>

    <script>
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";

        async function callGemini(prompt, sys) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: sys }] } };
            try {
                const response = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload),
                    signal: AbortSignal.timeout(8000) 
                });
                if (!response.ok) return null;
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) { return null; }
        }

        async function getConsultation() {
            const input = document.getElementById('situationInput').value;
            if (!input) return;
            const btn = document.getElementById('consultBtn');
            const output = document.getElementById('consultOutput');
            btn.innerText = "Querying...";
            output.classList.remove('hidden');
            output.innerText = "Processing heuristic nexus...";
            const response = await callGemini(input, "Strategy Oracle: Identify 1 law. Provide amoral tactical solution (2 sentences).");
            output.innerText = response || "Neural sync failed. Consult local archive logic.";
            btn.innerText = "Consult Oracle ✨";
        }

        async function expandIntelligence() {
            const law = lawsData.find(l => l.id === state.selectedId);
            const box = document.getElementById('neuralInsightBox');
            const content = document.getElementById('insightContent');
            const status = document.getElementById('aiSource');
            const btn = document.getElementById('expandBtn');

            box.classList.remove('hidden');
            content.innerText = law.readymade;
            status.innerText = "Neural Cache";
            status.className = "ai-status-tag status-cached";
            btn.innerHTML = "✨ Overdrive Sync...";

            const response = await callGemini(`Expand on Law #${law.id}: ${law.title}. Detail modern application and ruthlessness.`, "You are a master strategist.");
            if (response) {
                content.innerText = response;
                status.innerText = "Live AI Link";
                status.className = "ai-status-tag status-live";
                btn.innerHTML = "✨ Expanded Live";
            } else {
                btn.innerHTML = "✨ Intel Fixed";
            }
        }

        const lawsData = [
            { id: 1, title: "Never Outshine the Master", category: "Reputation", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Masters are like the sun; their ego provides warmth. Reminding them of their darkness triggers termination.", example: "Nicolas Fouquet imprisoned for life by Louis XIV after building a chateau more beautiful than the King's.", strategy: "Frame your innovations as suggestions your master once 'casually mentioned'.", reversal: "If the master is falling, outshine them to accelerate their fall.", readymade: "In the modern landscape, the 'Master' is often a CEO or a high-ego founder. Displaying raw, unbridled brilliance can be a fatal tactical error. If your insights make leadership look amateurish, you've signaled your threat, not your value. Tactical Pivot: Activate the 'Shadow Consultant' protocol. Frame every innovation as a realization of a 'brilliant point' the Master mentioned previously. By gifting them the intellectual property of the origin, you secure patronage. Triggering their 're-org' reflex—a mechanism to remove ego-discomfort—ends your tenure. Stay in the shadow until you are ready to become the sun.", visual: `<div class="w-16 h-16 bg-amber-500 rounded-full shadow-[0_0_50px_gold]"></div>` },
            { id: 2, title: "Never Trust Friends, Use Enemies", category: "Alliances", image: "https://images.unsplash.com/photo-1521791136064-7986c2959210?q=80", psych: "Friends are blinded by envy. Enemies have everything to prove and are more loyal when converted.", example: "Michael III of Byzantium murdered by the stable boy he raised to be his best friend.", strategy: "Hire professionals, not friends. Distance ensures objective judgment.", reversal: "A friend can be a useful scapegoat in a crisis.", readymade: "Shared history is the enemy of professional precision. Friends expect equity based on loyalty rather than performance. They are susceptible to the 'envy-blindness' of your rise. A friend knows your vulnerabilities; a rival knows only your power. Tactical Pivot: Hire converted rivals. A former competitor has everything to prove and will act with cold precision to secure their new position. In business, a 'favors' economy is unstable. A 'results' economy, built on converted enemies who depend on your continued success for survival, is the only stable foundation. Keep friends for social lubrication, never for operations.", visual: `<div class="w-20 h-1 bg-slate-700 relative"><div class="absolute -top-2 left-0 w-4 h-4 bg-rose-500 rounded-full"></div></div>` },
            { id: 3, title: "Conceal Your Intentions", category: "Deception", image: "https://images.unsplash.com/photo-1590422443890-2e46f632367c?q=80", psych: "Keep them guessing to drain their mental energy.", example: "Bismarck used a fake peace speech to trick the King into funding the military for a war.", strategy: "Talk endlessly about goals that don't matter. Create a smoke screen of honesty.", reversal: "A smokescreen only works if you don't already have a reputation for deceit.", readymade: "In the digital age, information is the precursor to a defense. If competitors can map your trajectory, they can automate a counter-strike. Silence is a start, but the true master uses Strategic Noise. Talk endlessly about legacy projects and philanthropic goals to draw the eyes of the market away from your true target. Tactical Pivot: In acquisitions, leak interest in a 'decoy' technology. While rivals rush to analyze that sector, quietly finalize patents for the actual disruptor. Smoke screens aren't built of silence; they are built of meaningless data.", visual: `<div class="w-16 h-16 border-4 border-dashed border-white/20 animate-spin"></div>` },
            { id: 4, title: "Always Say Less Than Necessary", category: "Communication", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "Words are like currency; the more you print, the less they are worth.", example: "Louis XIV would listen then say 'I shall see' and walk away, leaving courtiers in terror.", strategy: "Short answers create mystery. The less you speak, the less likely you say something foolish.", reversal: "Silence can look suspicious; use chatter to hide important data.", readymade: "Power is a game of appearances, and words are the currency. In a boardroom, the most powerful player is the one who speaks last. Silence creates a psychological vacuum that others feel an irresistible urge to fill with their own insecurities, secrets, and half-formed plans. Tactical Pivot: Use the 'Enigmatic Response.' When pressed for a definitive stance, provide a short, open-ended statement. The more vague you are, the more others project their own fears onto you. The sphinx-like presence is perceived as deeper and more dangerous than the open book.", visual: `<div class="w-24 h-1 bg-amber-500"></div>` },
            { id: 5, title: "Guard Reputation with Life", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Reputation precedes you. One slip destroys decades of labor.", example: "Chuge Liang sat alone on a wall playing a lute to scare off 150,000 troops who feared his traps.", strategy: "Anchor identity on one quality (reliability). Watch as it intimidates.", reversal: "If ruin is total, pivot to a new identity immediately.", readymade: "In the attention economy, your personal brand is your only true armor. Reputation is a force multiplier; it does the work of intimidating rivals before a single word is uttered. Once your brand is perceived as 'unbeatable,' the market will defend you on your behalf. Tactical Pivot: Anchor your professional identity on one non-negotiable quality. If you are known for 'Ruthless Efficiency,' rivals will hesitate to engage in a price war. Never allow a slight to go unanswered; in the digital realm, an uncorrected narrative becomes the only truth.", visual: `<div class="w-20 h-20 border-8 border-amber-500 rotate-45"></div>` },
            { id: 6, title: "Court Attention at All Cost", category: "Reputation", image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80", psych: "In power, being ignored is death.", example: "P.T. Barnum's brick-man loop packed his museum with curious crowds.", strategy: "Create an unforgettable image. Better slandered than ignored.", reversal: "Once established, pivot to 'high-end' prestige to gain legitimacy.", readymade: "Being ignored is the same as being dead. In early stages of a rise, quality matters less than volume. Scandal, mystery, and bold claims act as a magnet for capital and talent. A 'bad' review is still a link; a 'good' review nobody reads is useless. Tactical Pivot: Adopt a trademark behavioral quirk or visual identity. Viral marketing is scale-level Law 6—reach over prestige. Once the crowd has gathered, pivot to a 'high-end' brand identity to gain legitimacy. The spotlight is a prerequisite for power.", visual: `<div class="w-8 h-8 bg-amber-500 animate-ping"></div>` },
            { id: 7, title: "Get Others to Do the Work", category: "Power", image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80", psych: "Borrow brilliance. The master always appears to have done the labor.", example: "Edison took credit for Tesla's research to build General Electric.", strategy: "Hire specialists for labor while you claim the outcome.", reversal: "Ensure you have the power to protect credit once work is done.", readymade: "Aggregation is modern Law 7. Your time is finite; 'grinding' is a sign of low status. Borrow the brilliance of specialists to build your empire, ensuring your name is attached to the final outcome. Tactical Pivot: Build platforms, not products. A platform allows thousands to contribute labor for the 'privilege' of your reach. Like Edison with Tesla, you provide infrastructure and the face of the operation. You appear to have god-like capacity because you've mastered the 'brilliant bypass'.", visual: `<div class="w-12 h-12 border-2 border-white rounded animate-bounce"></div>` },
            { id: 8, title: "Make Others Come to You", category: "Tactics", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Control the tempo. Bait them with gains then strike.", example: "Talleyrand baited Napoleon into escaping Elba to ensure his ruin.", strategy: "Lure rivals to your home ground where they are fatigued.", reversal: "If time is against you, strike suddenly first.", readymade: "When reacting, you've lost initiative. Controlling tempo requires the other party to expend energy reaching your position. This applies to meetings, price negotiations, and frames. Tactical Pivot: Always set meetings in your office or a vette zone. The physical fatigue and adjustment required for opponents to travel puts them in a submissive state. Lure them with the promise of 'fabulous gains', then make them wait. By the time negotiation starts, you hold the cards because they have invested the most energy.", visual: `<div class="w-20 h-20 border-2 border-amber-500 animate-pulse"></div>` },
            { id: 9, title: "Win Through Action", category: "Influence", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Action is undeniable proof. Argument stirs resentment.", example: "Michelangelo faked chiseling David's nose to please a mayor.", strategy: "Demonstrate, don't explicate. Utility silences critics.", reversal: "Argument is useful as a deceptive smoke screen.", readymade: "Arguments are interpreted through insecurities. Action is a concrete reality that cannot be argued away. In corporate strategy, a working prototype is more persuasive than a hundred-page white paper. Tactical Pivot: Demonstrate, do not explicate. If a stakeholder tells you a design is flawed, don't explain the engineering; show a visualization that makes the flaw look like an intentional feature. Action bypasses the intellect and speaks directly to the senses. Successful results are the only proof that matters.", visual: `<div class="w-12 h-12 bg-white rotate-45"></div>` },
            { id: 10, title: "Infection: Avoid the Unhappy", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "Misery is a pathogen. The unlucky draw misfortune.", example: "Lola Montez ruined every man she touched with her instability.", strategy: "Audit circle for victims. Distance immediately.", reversal: "None. Misfortune is contagious.", readymade: "Misery is a pathogen, not a circumstance. Chronic failure results from self-destructive psychological patterns carried into every room. If you try to save a drowning man refusing to swim, you will only drown with him. Tactical Pivot: Conduct a 'psychological audit' of your inner circle. Distance yourself from 'victims' who encounter misfortune. Align strictly with the high-achieving and buoyant. Power flows toward those with positive momentum; associate with winners to absorb their energy by osmosis.", visual: `<div class="w-4 h-4 bg-rose-500 rounded-full"></div>` },
            { id: 11, title: "Keep People Dependent", category: "Power", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "To be needed is to be free.", example: "Bismarck made himself indispensable to Kings who disliked him.", strategy: "Own a critical secret that cannot be replaced.", reversal: "Dependency binds you to their fall.", readymade: "Independence is a myth; the goal is to be the infrastructure. To maintain freedom, ensure the 'Master' cannot function without you. Teaching them enough to do without you signs your termination papers. Tactical Pivot: In tech, this is 'ecosystem lock-in.' Own the data, key relationship, or process that is too expensive to replace. Your power is proportional to the 'switching cost' superiors face if they remove you. Become the spine of the organization and dictate the terms of survival.", visual: `<div class="w-1 h-32 bg-amber-500"></div>` },
            { id: 12, title: "Use Selective Honesty", category: "Deception", image: "https://images.unsplash.com/photo-1513885535751-8b9238bd345a?q=80", psych: "One sincere act covers dozens of lies.", example: "Victor Lustig returned $50,000 to Capone to win his trust.", strategy: "Confess a minor fault to appear transparent.", reversal: "If known as a liar, honesty looks like a trap.", readymade: "One sincere act provides cover for a dozen dishonest ones. Being 'vulnerable' about a minor mistake disarms the suspicious. Honesty is a tactical tool, not a requirement. Tactical Pivot: Confess a minor weakness on social media or in reviews. It humanizes you and creates a 'halo of transparency.' Once people believe you are honest about flaws, they won't suspect you of hiding true, high-stakes ambitions. Use honesty as a gift to open a hole in their armor.", visual: `<div class="w-20 h-4 bg-slate-800"></div>` },
            { id: 13, title: "Appeal to Self-Interest", category: "Alliances", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Greed is an engine. Show them how they win.", example: "Corcyra won an alliance by showing navy secured Athenian seas.", strategy: "Focus 100% on their KPIs, not your legacy.", reversal: "Appeal to vanity for those who prefer to feel noble.", readymade: "Mercy and gratitude are fickle emotions people resent. Self-interest is constant and predictable. When asking for a favor, ignore your needs and focus 100% on how they win. Tactical Pivot: In any pitch, remove 'I need'. Replace with 'The market ensures your gain' or 'This secures your promotion.' Align your goal with their greed. Once they see helping you makes them richer or more powerful, their resistance will vanish instantly.", visual: `<div class="w-16 h-16 border-2 border-white"></div>` },
            { id: 14, title: "Pose as Friend, Work as Spy", category: "Deception", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80", psych: "Knowing your rival is critical.", example: "Duveen paid clients' staff to learn their master's tastes.", strategy: "Ask indirect questions. Sincerity is the cleverest ruse.", reversal: "If caught spying, reputation is shattered forever.", readymade: "Information is the ultimate commodity. You cannot control events if you are in the dark about rivals' motives. Use social gatherings and chatter to 'probe' for weaknesses while maintaining a friendly front. Tactical Pivot: Practice 'Passive Listening' in boardrooms. By suppressing your ego and letting others talk about 'successes,' they reveal voids and fears. Sincerity is the cleverest ruse; give a fake secret to get a real one in return.", visual: `<div class="w-4 h-4 bg-amber-500 rounded-full"></div>` },
            { id: 15, title: "Crush Your Enemy Totally", category: "Conflict", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Total annihilation in spirit is path to peace.", example: "Genghis Khan never left a rival partially defeated; he absorbed or destroyed them.", strategy: "In legal disputes, leave no loopholes.", reversal: "If enemy will self-destruct, standing back is efficient.", readymade: "A wounded rival is a 'cancer' that will metastasize. Stopping halfway out of mercy allows them time to plot a comeback. There is no such thing as a 'former' enemy partially defeated. Tactical Pivot: In hostile takeovers or disputes, leave no loopholes. Absorb assets and dissolve the leadership entity entirely. Total annihilation in resources is the only path to permanent strategic peace. If you strike, ensure no path back for the opposition.", visual: `<div class="w-20 h-20 bg-rose-900/50 rounded-full"></div>` },
            { id: 16, title: "Use Absence to Increase Respect", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Too much circulation lowers price. Create value through scarcity.", example: "Deioces retired as judge until chaos made Medes beg him to rule.", strategy: "Limit availability to increase perceived value.", reversal: "Withdrawal works only if established. Otherwise, forgotten.", readymade: "Too much circulation makes the price go down. If always available, you become a 'habit'—and habits are eventually ignored. To increase value, master the temporary withdrawal. Tactical Pivot: As a consultant or leader, use 'limited windows' of availability. If you've established value, disappearing briefly will make you the subject of conversation and increase the 'bidding war' for your return. Scarcity generates honor.", visual: `<div class="w-16 h-16 border-2 border-white opacity-20"></div>` },
            { id: 17, title: "Air of Unpredictability", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Scramble patterns to terrify rivals.", example: "Bobby Fischer defeated Spassky by making explainless blunders.", strategy: "Scramble patterns daily to stimulate interest.", reversal: "Crisis teams need a stable core to avoid panic.", readymade: "Humans are 'pattern-matching' machines. If your moves are predictable, you give enemies control and allow them to automate responses. Turning the tables requires deliberate inconsistency. Tactical Pivot: Occasionally shift project focus or change baseline behavior for no reason. This 'tactical chaos' keeps teams agile and rivals terrified. They will wear themselves out looking for 'logical' explanations while your true path remains clear and ungraspable.", visual: `<div class="grid grid-cols-2 gap-2 w-12"><div class="h-4 bg-white"></div></div>` },
            { id: 18, title: "Do Not Build Fortresses", category: "Conflict", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Isolation cuts intelligence. Better mingle.", example: "First Emperor of China died alone, death hidden.", strategy: "Be the center of information flow.", reversal: "Occasional isolation is required for strategy.", readymade: "Isolation is a death sentence. While a 'fortress' feels safe, it cuts you off from intelligence needed to survive. It makes you a stationary target for enemies. Tactical Pivot: Social capital is your only true armor. Stay in the center of office flow where intelligence converges. Be permeable; mix with different social tiers. The 'connected' are protected by their web of allies, while the 'hermit' is picked off at the enemy's leisure.", visual: `<div class="w-20 h-20 border-2 border-white text-rose-500 flex items-center justify-center">X</div>` },
            { id: 19, title: "Know Who You Deal With", category: "Influence", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Deceive the wrong person and they seek revenge.", example: "Genghis Khan annihilated Muhammad of Khwarizm after an insult.", strategy: "Audit decision-maker's pride before tactical aggression.", reversal: "None. Misjudging is root of failure.", readymade: "No such thing as a 'generic' strategy. Every individual has a different trigger. Deceive the wrong person—especially a 'Serpent's memory'—and they will wait years to ruin you. Distinguish 'Wolf' from 'Lamb' before striking. Tactical Pivot: Run psychological audits on lead decision-makers. Identify primary ego-drivers: pride? greed? insecurity? Gather data on past reactions to slight. Knowing their 'type' prevents your tactical aggression from resulting in your eventual destruction.", visual: `<div class="w-12 h-12 bg-rose-500 shadow-[0_0_20px_red]"></div>` },
            { id: 20, title: "Do Not Commit to Anyone", category: "Alliances", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Stay neutral to be pursued by all sides. Independence is power.", example: "Elizabeth I dangled marriage for 40 years to keep all as allies.", strategy: "Position as neutral mediator.", reversal: "Commit at the end-game to secure the win.", readymade: "Commitment is a leash. Taking sides loses leverage. By staying neutral, you become the 'Master of the Room' that both sides must pursuit and bid for. Independence is the ultimate power pose. Tactical Pivot: Position yourself as the 'neutral mediator' in conflicts between departments or companies. Dangle the possibility of alignment to win concessions from both. As long as you remain uncommitted, you are the prize. The moment you yield, the magic is gone; you become just another pawn.", visual: `<div class="w-12 h-12 bg-amber-500 rounded-full"></div>` },
            { id: 21, title: "Play Sucker to Catch Sucker", category: "Deception", image: "https://images.unsplash.com/photo-1506126279646-a697353d3166?q=80", psych: "Intellectual vanity is universal. Hayseed mask is perfect.", example: "Arnold/Slack conned financiers with fake mine as 'hayseeds'.", strategy: "Downplay tech knowledge.", reversal: "None. Intelligence is the ultimate bait.", readymade: "Intellectual vanity is universal. No one likes feeling stupider than the person across the table. By appearing to be a 'hayseed' or naive observer, you disarm defensive muscles and lower their guard. Tactical Pivot: In high-stakes meetings, let the other party 'explain' their industry or strategy to you. Actively play the eager student. Their desire to feel superior leads them to reveal valuable data and vulnerabilities they would never share with a perceived 'equal'. Use vanity as the entry point.", visual: `<div class="w-16 h-16 bg-slate-800 text-white flex items-center justify-center font-black">?</div>` },
            { id: 22, title: "Use the Surrender Tactic", category: "Power", image: "https://images.unsplash.com/photo-1521791136064-7986c2959210?q=80", psych: "Yield to recover time and irritate conqueror.", example: "Bertolt Brecht outmaneuvered HUAC with cooperation.", strategy: "Inwardly firm, outwardly bend.", reversal: "Do not surrender to one who intends to kill you.", readymade: "Surrender is a smoke screen, not a defeat. When clearly the weaker party, fighting for 'honor' is suicide. Yielding lulls them into believing they have won, while you gain time to recover and plot their downfall. Tactical Pivot: If facing a hostile boss or takeover, stop resisting. Agree with their vision and defer to authority. While they relax guard, use access to map their internal systems and identify the point of eventual overextension. Inwardly stay firm; outwardly bend like water.", visual: `<div class="w-24 h-1 bg-white opacity-50"></div>` },
            { id: 23, title: "Concentrate Your Forces", category: "Tactics", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80", psych: "Intensity beats extensity. Mine one rich vein deep.", example: "Kingdom of Wu overextended and collapsed totally.", strategy: "Find one fat cow who gives milk for long time.", reversal: "Volatility requires diversification.", readymade: "Intensity defeats extensity every time. In the attention economy, dominating one tiny micro-niche is infinitely more profitable than being 10th place in five global markets. You gain more by mining one rich vein deep than flitting between shallow ones. Tactical Pivot: Find the 'One Fat Cow'—the one key client, platform, or skill set providing the most leverage. Affix yourself to that source of power and master it completely. Once you own the niche, authority becomes unassailable. Single focus finds the mark.", visual: `<div class="w-8 h-8 bg-amber-500 rounded-full shadow-[0_0_50px_orange]"></div>` },
            { id: 24, title: "Play the Perfect Courtier", category: "Reputation", image: "https://images.unsplash.com/photo-1544413550-934c5643444a?q=80", psych: "Master indirection. Flatter and yield obliquely.", example: "Castiglione's Sprezzatura: hide toil to look natural.", strategy: "Always talk less about yourself.", reversal: "Being too perfect makes you a target for envy.", readymade: "The modern courtier thrives on political dexterity. They have mastered the art of 'indirection'—never asking favors directly, never boasting, and always making the 'Master' look better through silent competence. Tactical Pivot: Practice Sprezzatura (nonchalance). Deliver results with an air of ease that makes others take you for a genius rather than a workaholic. Avoid ostentation and corporate gossip. By being a source of pleasure and efficiency for leadership, you become an indispensable favorite.", visual: `<div class="grid grid-cols-4 gap-1 w-10"><div class="h-2 bg-amber-500"></div></div>` },
            { id: 25, title: "Recreate Yourself", category: "Reputation", image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80", psych: "Forge identity that commands attention.", example: "George Sand forged male persona for access.", strategy: "Incorporate drama in public actions.", reversal: "Identity shift fatigue loses credibility.", readymade: "In a world dominated by search results and social media archives, your 'natural' self is a liability. You must become the primary architect of your own character. If you do not define your brand narrative, others will do it to your detriment. Tactical Pivot: Curate a 'high-definition' persona. Internalize behaviors that align with power position. Use signature aesthetics, communication styles, or origin stories. Identity is a costume; recreation makes you an icon impossible to ignore.", visual: `<div class="w-16 h-16 border-4 rotate-12"></div>` },
            { id: 26, title: "Keep Your Hands Clean", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Spotless efficiency. Mistakes go to pawns.", example: "Cleopatra used Caesar as cat's paw to eliminate siblings.", strategy: "Conceal mistakes via scapegoat.", reversal: "Over-cleanliness draws suspicion.", readymade: "Public image must remain a paragon of efficiency. The dirty work of power—layoffs, assassinations, litigation—leaves a 'scent'. Truly powerful are never seen with blood on their hands; they are seen as bringers of glorious results. Tactical Pivot: Deploy the 'Circuit Breaker' protocol. Use a 'cat's paw'—consultant or entity—to execute unpopular moves. If scandal erupts, blame is caught by external layers. You direct the lightning without being struck. Execution belongs to others.", visual: `<div class="w-12 h-1 bg-white animate-bounce"></div>` },
            { id: 27, title: "Create a Cult-Like Following", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "People need to believe. Offer cause.", example: "Bori claimed vision to see souls.", strategy: "Keep words vague. Emphasize visual.", reversal: "If cause fails, leader is lynched.", readymade: "In the absence of traditional community, people have a desperate need to believe. Logic is a weak adhesive; the heart is the true target. By offering transformative visions, unique rituals, and 'us vs them' narratives, you manufacture loyalty no salary can buy. Tactical Pivot: Sell a 'Future State' rather than features. Structure with degrees of sanctity. Use vague, high-promise language. Once you become focal points of identity, followers will defend you for free, viewing attacks on you as attacks on reality.", visual: `<div class="w-1 h-20 bg-amber-500 animate-pulse"></div>` },
            { id: 28, title: "Enter Action with Boldness", category: "Tactics", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Everyone admires bold. timidity is dangerous.", example: "Aretino hurled to fame mocking Pope's elephant.", strategy: "Correct mistakes with more audacity.", reversal: "Blind boldness is just stupidity.", readymade: "Hesitation ruins execution. Timidity signals lack of confidence and invites pushing around. Boldness has the magical property of hiding deficiencies. Mistakes made through audacity are corrected by doubling down with more. Tactical Pivot: Reset the baseline. Start with outrageous opening gambits. Establishing the 'Frame' establishes confidence. Rivals forced on defensive spend energy understanding you rather than looking for weaknesses. Everyone honors the bold; the timid are eventually discarded.", visual: `<div class="w-20 h-20 bg-amber-500 shadow-xl"></div>` },
            { id: 29, title: "Plan All the Way to the End", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Ending is everything.", example: "Balboa found Pacific but didn't plan for rivals.", strategy: "Don't be overwhelmed by luck.", reversal: "Rigid plans fail in chaos.", readymade: "Most failures occur because individuals are blinded by initial thrill. Reaching milestones causes sense of proportion loss, and they are picked off by vultures. The ending determines who reaps rewards and who is left with labor. Tactical Pivot: Map the 'Vulture Vector'. Identify exactly how it ends and how you exit before starting partnerships. Predict moves of people claiming credit once results are visible. If you don't foresee the final obstacle, hard work is merely fertilizer for someone else's rise. Stop at the mark.", visual: `<div class="w-12 h-12 bg-slate-800 border-2 border-white"></div>` },
            { id: 30, title: "Make Accomplishments Effortless", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Hide toil. Looks like genius.", example: "Houdini spent years in secret training.", strategy: "Conceal clever tricks.", reversal: "If too easy, people think you're lazy.", readymade: "Toil is the mark of a subordinate. If you show the 'grind', you look replaceable. Results must appear as inevitable byproducts of genius. Grace and ease are visual signatures of power. Tactical Pivot: Practice 'Invisible Sprint'. Do heavy lifting and research in total dark. Present final outcomes with nonchalant shrugs. Hide the tricks and shortcuts. When others see high-impact results without sweat, they conclude capacity is untapped—leaving them in respectful fear.", visual: `<div class="w-12 h-1 bg-amber-500 rotate-45"></div>` },
            { id: 31, title: "Control the Options", category: "Deception", image: "https://images.unsplash.com/photo-1506126279646-a697353d3166?q=80", psych: "Victims are puppets.", example: "Ivan Terrible abdicated for power grant.", strategy: "Color choices.", reversal: "If obviously evil, they attack you.", readymade: "Most effective way to force someone's hand is to make them feel they made the choice. People resent being told what to do but follow if they believe they selected the path. Art of 'Guided Choice'. Tactical Pivot: Use 'Two Favors' protocol. Present two options—both yielding results you want. Frame A as 'Bold' and B as 'Prudent'. Controlling the menu ensures whichever way they turn, they move exactly where you directed. They feel autonomy; you keep the power of outcome.", visual: `<div class="w-10 h-20 border border-white"></div>` },
            { id: 32, title: "Play to People's Fantasies", category: "Influence", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Life is harsh; people flock to romance.", example: "Bragadino convinced Venice he could make gold.", strategy: "Truth is ugly.", reversal: "Fantasies pop. Have exit strategy.", readymade: "Reality is drab and painful. People flock to anyone spinning romance out of harsh situations. Logic kills the sell, but crafted fantasy secures investment and loyalty. Tactical Pivot: Be the vessel for dreams. In marketing/leadership, don't focus on 'incremental improvement' (truth). Focus on 'Great Transformation' (fantasy). Like Bragadino, provide visual proof before results exist. By the time reality sets in, accumulate power/momentum to make fantasy true or move on. Logic kills.", visual: `<div class="text-amber-500">✧</div>` },
            { id: 33, title: "Discover Each Man's Thumbscrew", category: "Psychology", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Everyone has weakness. insecurity or pleasure.", example: "Duveen validated Huntington's status.", strategy: "Listen for complaints.", reversal: "Overuse makes victim prefer death.", readymade: "Everyone has a psychological void—secret vanity, childhood fear, hidden pleasure. Once you locate the 'handle', the person is yours. Insecurity is common entry. Tactical Pivot: Practice 'Void-Sensing'. Listen for what people complain about most—GPS coordinates to deepest sensitivities. If they boast of strength, they hide fear. If aggressive, likely insecure. By filling the void—validation or access—you turn the thumbscrew. They will follow because you provide what they cannot give themselves.", visual: `<div class="w-4 h-12 bg-amber-500"></div>` },
            { id: 34, title: "Be Royal in Your Own Fashion", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Act like a King to be one.", example: "Columbus demand for royal titles.", strategy: "Demand much.", reversal: "Acting royal without status is clownish.", readymade: "The way you carry yourself is the price tag the world places on you. Acting like a 'commoner' invites common treatment. Quiet, regal confidence infects others with belief in your destiny to lead. Tactical Pivot: Use 'Strategy of the Crown'. Demand and expect as much as a child who knows they are loved. Never apologize for high standards or price. Confidence radiates value. Setting high prices signals intrinsic worth. Act as if destined for top, and the world will make room.", visual: `<div class="text-amber-500 font-black">♛</div>` },
            { id: 35, title: "Master the Art of Timing", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Never seem in a hurry.", example: "Fouché survived multiple regimes.", strategy: "Wait for fruition.", reversal: "Wait too long and opportunity vanishes forever.", readymade: "Speed is a tool, not a lifestyle. Hurrying signals lack of control. Power belongs to those who sniff out spirit of times—social/economic trends—and wait for peak moments. Tactical Pivot: Distinguish Long Time (waiting for trends), Forced Time (interrupting rivals), and End Time (ruthless speed). Never enter early; let others exhaust themselves clearing paths. Wait for peak wave, then use every resource. Timing is the intersection of patience and violence.", visual: `<div class="w-1 h-12 bg-amber-500 origin-bottom animate-spin"></div>` },
            { id: 36, title: "Disdain Things You Cannot Have", category: "Power", image: "https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80", psych: "Acknowledging a petty problem gives it life.", example: "Henry VIII ignored Pope and started own church.", strategy: "Contempt is superiority.", reversal: "Disdain only for powerful.", readymade: "Acknowledging petty problems or minor rivals gives them credibility. More attention makes them more real. If beneath you, best revenge is ignoring into non-existence. Contempt is served cold. Tactical Pivot: Practice 'Strategic Silence'. When competitors issue 'takedowns', do not respond. Response is oxygen they need. Silence signals they aren't on tactical radar. If project wanted but lost, show contempt. If it was 'worthless' anyway, you escaped.", visual: `<div class="w-8 h-8 border-2 border-white opacity-10"></div>` },
            { id: 37, title: "Create Compelling Spectacles", category: "Influence", image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80", psych: "Visual is route to heart. symbols create aura.", example: "Poitiers identified with Diana.", strategy: "Stage spectacles.", reversal: "Ensure core message survives dazzle.", readymade: "Imagery and symbols bypass critical filters. Well-staged spectacles—radiant visuals and arresting symbols—create power aura verbal argument cannot match. People respond to keynotes, not white papers. Tactical Pivot: Dazzle senses to distract intellect. Use high-quality visuals, lighting, and symbols in presentations. Associate work with powerful past symbols to elevate status. Caught in communal awe, teams lose ability to be skeptical of true intentions. Visual is fastest route to heart.", visual: `<div class="w-20 h-20 bg-amber-500 rounded-full opacity-10"></div>` },
            { id: 38, title: "Think As You Like, Behave Like Others", category: "Tactics", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "Going against times is punished.", example: "Pausanias executed for luxury.", strategy: "Blend in.", reversal: "Blend too much and you're forgotten.", readymade: "Flaunting unconventional ideas is sign of vanity, not power. It makes people defensive, inviting punishment for arrogance. Safer to blend with orthodoxy in public while keeping disruptive originality private. Tactical Pivot: Wear 'Industry Uniform'. Mouth conventional wisdom and attend standard events. Appearing 'one of them' gives cover for private innovation. Once power established, begin shifting culture toward your thinking—only after perceived as core member.", visual: `<div class="w-4 h-4 bg-white"></div>` },
            { id: 39, title: "Stir Up Waters to Catch Fish", category: "Tactics", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Anger is counterproductive.", example: "Haile Selassie goaded rival into doomed rebellion.", strategy: "Rattle them while calm.", reversal: "Might attract a shark.", readymade: "Emotional opponents are predictable. Staying calm while making enemies angry gives massive tactical advantage. Anger is 'low-frequency' draining mental energy and causing blunders. Tactical Pivot: Find chinks in vanity. Rattle sense of dignity while remaining analytical. Like Haile Selassie, force premature action. When they explode, they reveal 'form' and become stationary targets. Let them drown in whirlpool of emotions while you net results.", visual: `<div class="w-20 h-20 border-2 border-white animate-ping"></div>` },
            { id: 40, title: "Despise the Free Lunch", category: "Power", image: "https://images.unsplash.com/photo-1579621970795-87f9c7216289?q=80", psych: "Offered free is dangerous. Pay full price.", example: "Marlborough's cheapness ruined her.", strategy: "Generosity is sign/magnet.", reversal: "Free lunch is a bribe.", readymade: "Offered 'free' items come with psychological/financial price tags—hidden obligations or quality compromises. Power requires maneuver freedom; full price keeps independence and excellence reputation. Tactical Pivot: Be lavish with capital. Generosity is power magnet. Paying own way avoids gratitude/guilt. Paying for mentor lunch signals peer status, not beggar. Money is social lubrication and establishment of 'royal' status.", visual: `<div class="text-amber-500 font-bold">$</div>` },
            { id: 41, title: "Avoid Stepping Into Big Shoes", category: "Reputation", image: "https://images.unsplash.com/photo-1510443422037-123497d33d9c?q=80", psych: "What happens first looks better.", example: "Alexander hated Philip's style.", strategy: "Slay legacy.", reversal: "Don't look bitter.", readymade: "Successors are judged against idealized peak performance. Following 'great men' requires double results for equality. Slay legacy and change institution direction to gain power. Tactical Pivot: Reset success metrics. If taking over department, don't 'improve' old systems. Break and implement 'New Order' with different branding and metrics. Changing game ensures predecessor shadow has nowhere to fall. Slay overbearing father to create own kingdom.", visual: `<div class="w-16 h-16 bg-slate-800 border-2 border-white"></div>` },
            { id: 42, title: "Strike the Shepherd", category: "Conflict", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Trouble comes from stirrer. Strike source.", example: "Athens banishment of stirrer.", strategy: "Isolate source.", reversal: "Identify second in command.", readymade: "Trouble in groups/markets traces to single strong individuals—'stirrers' or 'poisoners'. Allowing them operation infects the group. Negotiate with source by removal, not words. Tactical Pivot: Identify 'Center of Gravity'. Find person providing energy for dissent. Isolate/banish from core operations. Without shepherd, sheep scatter and lose cohesion. Strike source, and realm peace is restored instantly.", visual: `<div class="w-4 h-4 bg-rose-500 animate-ping"></div>` },
            { id: 43, title: "Work on Hearts and Minds", category: "Influence", image: "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?q=80", psych: "Seduce them to move your way. Play on fear.", example: "Marie Antoinette lived in bubble; no charm.", strategy: "Operate on psychologies.", reversal: "In crisis, coercion is faster than seduction.", readymade: "Coercion is high-cost, triggering violent reactions. True power is Seduction. Make others *want* to move your way by operating on individual psychologies and ambitions. Tactical Pivot: Find 'Personal Why'. Don't give orders; link project success to team personal life goals. Belief that following you makes *them* successful creates voluntary zeal. Seduce heart, and mind justifies obedience.", visual: `<div class="text-amber-500 text-2xl">♥</div>` },
            { id: 44, title: "Disarm with the Mirror Effect", category: "Deception", image: "https://images.unsplash.com/photo-1513885535751-8b9238bd345a?q=80", psych: "Mirroring enemies makes them overreact.", example: "Alcibiades Gain power mirroring every culture.", strategy: "Hold up mirror.", reversal: "If they mirror you, they spy.", readymade: "People find it impossible to fight reflection of own values. Mirroring enemies—doing exactly as they do—loses their ability to map strategy. Mirror mocks, humiliates, or seduces into false security. Tactical Pivot: Use 'Mirror Seduction'. Fathom inmost desires/lifestyles and reflect back perfectly. Become chameleon absorbing environment colors. Seeing 'soul' in you drops their guard—opening manipulation/influence.", visual: `<div class="flex space-x-1"><div class="w-8 h-16 bg-amber-500"></div></div>` },
            { id: 45, title: "Preach Change, Reform Slowly", category: "Tactics", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80", psych: "Innovation is traumatic. improvement vibe.", example: "Cromwell rapid reform caused revolt.", strategy: "Preach change in abstract, respect old.", reversal: "If old order toxic, total reform.", readymade: "Humans are habit creatures dreading total innovation 'void'. Abstract change understanding doesn't prevent routine wrench revolts. Tactical Pivot: Preserve 'Form'. Use old terminology/names for radical new strategy. Preach 'return to core values' while quietly installing new functions. Change must feel like natural, gentle improvement on past rather than traumatic disruption. Habit is strongest nature force; don't fight head-on.", visual: `<div class="w-10 h-10 border border-white"></div>` },
            { id: 46, title: "Never Appear Too Perfect", category: "Reputation", image: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80", psych: "Appearing better creates envy.", example: "Joe Orton success stirred murder.", strategy: "Admit minor fault.", reversal: "Major weakness crushes you.", readymade: "Appearing better is dangerous; no faults is fatal. Perfection creates silent enemies and fuels 'unhappy admiration' leading to sabotage. Only gods/dead allowed perfection. Tactical Pivot: Admit harmless vice/minor defect. Mention personal struggles unrelated to professional competence. Appearing 'human' deflects envy targeting successes. Minor flaw is tactical shield making you approachable and less of a target.", visual: `<div class="w-12 h-12 bg-white rounded-full"></div>` },
            { id: 47, title: "Do Not Go Past the Mark", category: "Tactics", image: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80", psych: "Victory is peril. Arrogance kills.", example: "Cyrus greedy for blood.", strategy: "Set goal, then stop.", reversal: "Stop early, enemy recovers.", readymade: "Victory moment is point of greatest danger. Victory heat pushes past original goals—territories without allies/intel. Tactical Pivot: Control 'Elation Reflex'. Set specific goal before starting. Once hit, stop immediately. Do not allow 'dancing feet' to impel forward into new unplanned conflicts. In victory, step back, consolidate gains, study luck's role. Strategy beats ego every time.", visual: `<div class="w-16 h-1 bg-white relative"><div class="absolute right-0 h-4 w-4 bg-rose-500"></div></div>` },
            { id: 48, title: "Assume Formlessness", category: "Adaptability", image: "https://images.unsplash.com/photo-1540654803822-094772396e27?q=80", psych: "Fluidity offers no target. mercury logic.", example: "Mao's Mercury logic to win.", strategy: "Develop multi-channel brand.", reversal: "Firm stand necessary to intimidate.", readymade: "Rigidity is first step toward extinction. Fixed shapes—business models, plans—can be destroyed. Ultimate power pose: fluid as water. Tactical Pivot: Develop Multi-Channel Presence. In creator/corporate economies, don't lock into one niche forever. Be everywhere and nowhere. Like Mao, take environment form while remaining powerful within. Enemies unable to hit stationary targets wear themselves out. Be mercury: fluid, elusive, heavy.", visual: `<div class="w-16 h-16 border-4 border-dashed animate-spin"></div>` }
        ];

        let state = { selectedId: null, voices: [], selectedVoice: null, readingTarget: null };
        const synth = window.speechSynthesis;

        function initApp() { 
            renderList(lawsData); 
            requestAnimationFrame(() => initChart());
            loadVoices(); 
            setupInteractions(); 
        }

        function loadVoices() {
            state.voices = synth.getVoices();
            if (state.voices.length) populateVoiceDropdown();
            else synth.onvoiceschanged = () => { state.voices = synth.getVoices(); populateVoiceDropdown(); };
        }

        function populateVoiceDropdown() {
            const select = document.getElementById('voiceSelect');
            if (!select) return;
            select.innerHTML = '<option value="">Neural Strategist</option>';
            state.voices.forEach((v, i) => { const o = document.createElement('option'); o.value = i; o.textContent = `${v.name} [${v.lang}]`; select.appendChild(o); });
            select.onchange = (e) => { state.selectedVoice = state.voices[e.target.value] || null; };
        }

        function setupInteractions() {
            const filter = document.getElementById('lawsFilter');
            if (filter) {
                filter.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    renderList(lawsData.filter(l => l.title.toLowerCase().includes(term) || l.category.toLowerCase().includes(term)));
                });
            }
        }

        function renderList(data) {
            const list = document.getElementById('laws-list');
            if (!list) return;
            list.innerHTML = '';
            data.forEach(law => {
                const div = document.createElement('div');
                div.className = `p-4 border-b border-white/5 law-item cursor-pointer hover:bg-white/5 ${state.selectedId === law.id ? 'active' : ''}`;
                div.innerHTML = `<div class="flex justify-between">
                    <p class="text-xs font-bold text-slate-200">${law.title}</p>
                    <span class="text-[9px] font-mono text-slate-600">${law.id}</span>
                </div>`;
                div.onclick = () => selectLaw(law.id);
                list.appendChild(div);
            });
        }

        function selectLaw(id) {
            state.selectedId = id;
            synth.cancel();
            const law = lawsData.find(l => l.id === id);
            const empty = document.getElementById('empty-state');
            const content = document.getElementById('detail-content');
            if (empty) empty.classList.add('hidden');
            if (content) content.classList.remove('hidden');
            
            document.getElementById('neuralInsightBox').classList.add('hidden');
            document.getElementById('detail-title').innerText = law.title;
            document.getElementById('detail-category').innerText = law.category;
            document.getElementById('detail-psych').innerText = law.psych;
            document.getElementById('detail-example').innerText = law.example;
            document.getElementById('detail-strategy').innerText = law.strategy;
            document.getElementById('detail-reversal').innerText = law.reversal;
            document.getElementById('visual-analogy').innerHTML = law.visual;
            document.getElementById('detail-image').src = law.image;
            
            renderList(lawsData);
            document.querySelectorAll('.readable-section').forEach(el => { el.onclick = (e) => { e.stopPropagation(); setReadingCursor(el); }; });
        }

        function setReadingCursor(element) {
            if (state.readingTarget) state.readingTarget.classList.remove('reading-now');
            state.readingTarget = element;
            state.readingTarget.classList.add('reading-now');
            synth.cancel();
            playSpeech();
        }

        function playSpeech() {
            if (!state.readingTarget) return;
            const utter = new SpeechSynthesisUtterance(state.readingTarget.innerText);
            utter.rate = 0.95;
            if (state.selectedVoice) utter.voice = state.selectedVoice;
            utter.onstart = () => { document.getElementById('voiceBars').classList.add('animating'); };
            utter.onend = () => { document.getElementById('voiceBars').classList.remove('animating'); };
            synth.speak(utter);
        }

        function pauseSpeech() { synth.pause(); }
        function stopSpeech() { synth.cancel(); }

        function initChart() {
            const canvas = document.getElementById('powerChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Reputation', 'Tactics', 'Deception', 'Influence', 'Conflict', 'Adaptability'],
                    datasets: [{
                        label: 'Archive Bias',
                        data: [90, 75, 95, 80, 70, 85],
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderColor: '#F59E0B',
                        borderWidth: 1,
                        pointRadius: 0
                    }]
                },
                options: { maintainAspectRatio: false, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
